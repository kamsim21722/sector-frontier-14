- type: vessel
  parent: BaseVessel
  id: BMSpectre
  name: BM-Spectre
  description: "Большой научный корабль, переоборудованный под настоящую крепость. Последний сохранившийся представитель своей модели."
  price: 200000 #test
  limit: 4
  category: Large
  group: ASBlackMarket
  whitelist:
  - Frontier
  - Luna
  class:
  - Cargo # Lua
  - Science
