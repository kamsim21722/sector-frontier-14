- type: entity
  id: OmniThrusterLua
  name: omni thruster
  suffix: LuaTech, Луа, Тир 5, Магнитный
  parent: [BaseThruster, ConstructibleMachine]
  components:
  - type: LuaTech
  - type: Tag
    tags:
    - OmniBurnAlwaysOn
  - type: Sprite
    sprite: _Lua/Structures/Shuttles/thruster_omni.rsi
    offset: 0,0
    layers:
    - state: base_luatech
      map: ["enum.ThrusterVisualLayers.Base"]
    - state: thrust_luatech
      map: ["enum.ThrusterVisualLayers.ThrustOn"]
      shader: unshaded
      visible: false
      color: "#7962a8"
    - state: thrust_burn_unshaded
      map: ["enum.ThrusterVisualLayers.ThrustingUnshaded"]
      shader: unshaded
      visible: false
      offset: 0,1.85
      color: "#d5c9ee"
  - type: PointLight
    enabled: false
    castShadows: false
    radius: 1.5
    color: "#7962a8"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.49,-0.49,1.49,0.49"
        density: 1750
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: RadarBlip
    radarColor: "#99FF99"
    scale: 1.2
    shape: diamond
  - type: Machine
    board: OmnidirectionalThrusterMachineCircuitboard
  - type: ApcPowerReceiver
    powerLoad: 10000
  - type: Thruster
    thrusterType: Omnidirectional
    baseThrust: 800
    thrust: 800
    thrustPerPartLevel: [1000, 1200, 1400, 1600, 1900]
    burnShape: ["-0.8,1.2","0,2.0","0.8,1.2","1.3,0.5"]
    angularThrustExtra: 1900
    damage:
      types:
        Heat: 40
        Structural: 40
  - type: ThermalSignature
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15000
      behaviors:
        - !type:DoActsBehavior
          acts: ["Destruction"]
        - !type:SpawnEntitiesBehavior
          spawn:
              TeslaMiniEnergyBall:
                min: 1
                max: 3
        - !type:PlaySoundBehavior
          sound:
            collection: MetalBreak

# MARK: Medium Thruster

