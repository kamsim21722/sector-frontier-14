- type: entity
  name: wide sink
  id: SinkWideEmpty
  parent: SinkEmpty
  suffix: Empty
  components:
  - type: Sprite
    sprite: Structures/Furniture/sink.rsi
    layers:
      - state: sink_wide
      - map: [ "enum.SolutionContainerLayers.Fill" ]
        state: sink_wide-fill-1
        visible: false
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    fillBaseName: sink_wide-fill-
    solutionName: drainBuffer
  - type: Construction
    graph: SinkGraph
    node: SinkWideNode

- type: entity
  name: wide sink
  id: SinkWide
  parent: SinkWideEmpty
  suffix: Water
  components:
  - type: SolutionContainerManager
    solutions:
      drainBuffer:
        maxVol: 200
      tank:
        reagents:
        - ReagentId: Water
          Quantity: 300
