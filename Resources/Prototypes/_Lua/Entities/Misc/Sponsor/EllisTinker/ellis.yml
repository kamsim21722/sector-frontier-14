- type: entity
  parent: SyndicateJawsOfLife
  id: SyndicateJawsOfLifeEllisTinker
  name: челюсти жизни
  description: Продвинутый инженерный инструмент, значительно ускоряет работу. Корпус изготовлен из сплава тёмного титана, выполнено на заказ.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Lua/Sponsor/EllisTinker/tools_jawsoflife.rsi
    state: syn_jaws_pry
  - type: Item
    inhandVisuals:
      left:
      - state: syn_inhand-left
      right:
      - state: syn_inhand-right
    size: Normal
  - type: MultipleTool
    entries:
    - behavior: Prying
      sprite:
        sprite: _Lua/Sponsor/EllisTinker/tools_jawsoflife.rsi
        state: syn_jaws_pry
      useSound: /Audio/Items/jaws_pry.ogg
      changeSound: /Audio/Items/change_jaws.ogg
    - behavior: Cutting
      sprite:
        sprite: _Lua/Sponsor/EllisTinker/tools_jawsoflife.rsi
        state: syn_jaws_cutter
      useSound: /Audio/Items/jaws_cut.ogg
      changeSound: /Audio/Items/change_jaws.ogg
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 14

# drill
- type: entity
  parent: PowerDrill
  id: PowerDrillEllisTinker
  name: электродрель
  description: Продвинутый инженерный инструмент, значительно ускоряет работу. Корпус изготовлен из сплава тёмного титана, выполнено на заказ.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Lua/Sponsor/EllisTinker/tools_powerdrill.rsi
    state: drill_screw
  - type: Item
    sprite: _Lua/Sponsor/EllisTinker/tools_powerdrill.rsi
    size: Small
  - type: Tool
    qualities:
    - Screwing
    speedModifier: 1.5
    useSound: /Audio/Items/drill_use.ogg
  - type: MultipleTool
    statusShowBehavior: true
    entries:
    - behavior: Screwing
      sprite:
        sprite: _Lua/Sponsor/EllisTinker/tools_powerdrill.rsi
        state: drill_screw
      useSound:
        path: /Audio/Items/drill_use.ogg
      changeSound:
        path: /Audio/Items/change_drill.ogg
    - behavior: Anchoring
      sprite:
        sprite: _Lua/Sponsor/EllisTinker/tools_powerdrill.rsi
        state: drill_bolt
      useSound:
        path: /Audio/Items/drill_use.ogg
      changeSound:
        path: /Audio/Items/change_drill.ogg

