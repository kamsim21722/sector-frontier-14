- type: entity
  parent: [ClothingOuterHardsuitAtmos, HardsuitSpeedBuff]
  id: ClothingOuterHardsuitEllisTinker
  name: бронескафандр UF-16
  description: Это броню прославила серия детективных романов 'блюститель правды; правдивые блюстители', где её носил главный герой, настоящий образец патриотизма, защищавший нас от предательской лжи.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Lua/Sponsor/EllisTinker/hardsuit.rsi
  - type: Clothing
    sprite: _Lua/Sponsor/EllisTinker/hardsuit.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitEllisTinker
  - type: Item
    size: Huge
  - type: PressureProtection
    highPressureMultiplier: 0.05
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.65
        Slash: 0.65
        Piercing: 0.6
        Heat: 0.7
        Radiation: 0.5
        Caustic: 0.5
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot
        showEnts: false
        occludes: true
        ent: null
      cell_slot: !type:ContainerSlot
        showEnts: false
        occludes: true
        ent: null
      beakerSlot: !type:ContainerSlot # imperial hardsuit injection

