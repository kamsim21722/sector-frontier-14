- type: entity
  name: пюре с тефтелями
  parent: FoodBowlBase
  id: FoodMashed
  description: Нежнейшая толченая картошка с тефтелями. Кажется его придумали вульпы
  components:
  - type: FlavorProfile
    flavors:
      - meatballs
      - potatoes
  - type: Sprite
    sprite: /Textures/_Lua/Objects/Consumable/Food/mashed.rsi
    layers:
    - state: bowl
    - state: mashed-potatoes-with-meatballs
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 40
        reagents:
        - ReagentId: Nutriment
          Quantity: 30
        - ReagentId: Vitamin
          Quantity: 4
        - ReagentId: Protein
          Quantity: 4
  - type: Tag
    tags:
    - Meat
    - Soup