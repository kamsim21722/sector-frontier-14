    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       pda_vip
  - type: Pda
    id: VipIDCard
  - type: PdaBorderColor
    borderColor: "#171511"
    accentVColor: "#b0a813"
  - type: Icon
    sprite: _Lua/Objects/Devices/pda.rsi
    state: pda_vip

