- type: entity
  parent: [ClothingBackpackERTSecurity, BaseC3SyndicateContrabandPremium]
  id: ClothingmodsuitBloodRedHardsuit
  name: Blood-red Modsuit
  description: A hardsuit adorned with signature markings of the syndicate. The armor is remarkably nimble for the protection it offers.
  components:
    - type: Storage
      grid:
       - 0,0,9,5
    - type: Sprite
      sprite: _Lua/Clothing/Back/Backpacks/nukeops.rsi
    - type: Clothing
      sprite: _Lua/Clothing/Back/Backpacks/nukeops.rsi
    - type: ContainerContainer
      containers:
        storagebase: !type:Container
        toggleable-clothing: !type:ContainerSlot
    - type: ToggleableClothing
      clothingPrototype: ClothingOuterHardsuitBloodRedHardsuit
      requiredSlot: back
      slot: outerClothing

