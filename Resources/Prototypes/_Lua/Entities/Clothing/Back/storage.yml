- type: entity
  parent: ClothingBackpack
  id: ClothingBackpackPathologist
  name: рюкзак патологоанатома
  description: Рюкзак патологоанатома - донеси свою любовь к трупам, не говоря даже слов.
  components:
  - type: Sprite
    sprite: _Lua/Clothing/Back/Backpacks/pathologist.rsi

- type: entity
  parent: ClothingBackpackDuffel
  id: ClothingBackpackDuffelPathologist
  name: вещмешок патологоанатома
  description: Большой вещмешок для хранения дополнительных медицинских припасов.
  components:
    - type: Sprite
      sprite: _Lua/Clothing/Back/Duffels/pathologist.rsi

- type: entity
  parent: ClothingBackpackSatchel
  id: ClothingBackpackSatchelPathologist
  name: сумка патологоанатома
  description: Идеальная сумка, чтобы переносить свои тайны вместе с несколькими косточками в кармане.
  components:
  - type: Sprite
    sprite: _Lua/Clothing/Back/Satchels/pathologist.rsi

- type: entity
  parent: [ClothingBackpack, BaseC1SyndicateContraband]
  id: ClothingBackpackSatchelOutpostTypan
  name: сумка синдиката
  description: Модная сумка в красно-чёрных тонах.
  components:
  - type: Storage
    grid:
    - 0,0,1,3
    - 3,0,6,3
    - 8,0,9,3
  - type: Sprite
    sprite: _Lua/Clothing/Back/bag.rsi

- type: entity
  parent: [ Clothing, EnergyShieldClothing ]
  id: ClothingBackpackEnergyShield
  name: Генератор поля Абсолютной Защиты
  description: Экспериментальный, тяжелый генератор защитного поля. Обеспечивают дополнительную защиту от пуль, лазеров и ударов, однако позвоночник не скажет спасибо от долгого ношения этой дуры.
  components:
  - type: Sprite
    sprite: Clothing/Back/Specific/harmpack.rsi
    state: icon
  - type: Item
    size: Ginormous
  - type: Clothing
    slots:
      - BELT
      - BACK
  - type: ClothingSpeedModifier #Lua
    walkModifier: 0.8
    sprintModifier: 0.8
  - type: HeldSpeedModifier

