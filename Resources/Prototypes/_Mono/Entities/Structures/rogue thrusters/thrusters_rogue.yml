- type: entity
  id: ThrustermediumRogue
  parent: ThrusterMedium
  suffix: Синдикат, StormCreed
  components:
  - type: Sprite
    sprite: _Mono/Structures/Shuttles/thrusterrogue_large.rsi

- type: entity
  id: ThrusterRogue
  parent: ThrusterPirates
  name: ракетный двигатель
  suffix: Синдикат, StormCreed
  components:
  - type: Sprite
    sprite: _Mono/Structures/Shuttles/thrusterrogue.rsi
    layers:
    - state: base
      map: ["enum.ThrusterVisualLayers.Base"]
    - state: thrust
      map: ["enum.ThrusterVisualLayers.ThrustOn"]
      shader: unshaded
      visible: false
      color: "#C44D57"
    - state: thrust_burn_unshaded
      map: ["enum.ThrusterVisualLayers.ThrustingUnshaded"]
      shader: unshaded
      visible: false
      offset: 0, 1
      color: "#C44D57"
  - type: Thruster
    damage:
      types:
        Heat: 40
        Structural: 40

- type: entity
  parent: [BaseThruster, ConstructibleMachine]
  id: ThrusterLargeRogue
  name: large thruster
  suffix: Синдикат, StormCreed
  placement:
    mode: AlignTileAny
  components:
  - type: Machine
    board: ThrusterMachineCircuitboard
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15000
      behaviors:
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.5,-1.5,1.5,1.5"
        density: 1750
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: ApcPowerReceiver
    powerLoad: 12500
  - type: Thruster
    baseThrust: 800
    thrust: 800
    thrustPerPartLevel: [1000, 1200, 1400, 1600, 1800]
    burnShape: ["-0.8,1.2","0,2.0","0.8,1.2","1.3,0.5"]
    damage:
      types:
        Heat: 120
        Structural: 120
  - type: Sprite
    sprite: _Lua/Structures/Shuttles/RogueThrusterHuge.rsi
    offset: 0,0
    layers:
    - state: base
      map: ["enum.ThrusterVisualLayers.Base"]
    - state: thrust
      map: ["enum.ThrusterVisualLayers.ThrustOn"]
      shader: unshaded
      visible: false
    - state: thrust_burn_unshaded
      map: ["enum.ThrusterVisualLayers.ThrustingUnshaded"]
      shader: unshaded
      visible: false
      offset: 0,2.8
  - type: Anchorable
    flags: None
  - type: StaticPrice
    price: 5000
  - type: RadarBlip
    radarColor: "#99FF99"
    scale: 1.5
    shape: diamond