# Base
- type: entity
  id: BaseMagazine127x99mm
  name: "magazine (12.7x99mm)"
  suffix: Need balance test #Lua
  parent: [BaseItem, BaseC3PirateContraband, RecyclableItemSteelTiny] # Lua: Added RecyclableItemSteelTiny
  abstract: true
  components:
  - type: Tag
    tags:
      - Magazine127x99mm
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge127x99mm
    proto: Cartridge127x99mm
    capacity: 10
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Magazine/12.7x99mm/12.7x99mm_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

# Standart
- type: entity
  id: Magazine127x99mm
  name: "magazine (12.7x99mm anti-material)"
  parent: BaseMagazine127x99mm
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge127x99mm

- type: entity
  id: Magazine127x99mmEmpty
  name: "magazine (12.7x99mm empty)"
